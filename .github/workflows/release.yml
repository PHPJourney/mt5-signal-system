name: Create Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      is_prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  trigger-builds:
    name: Trigger Platform Builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ github.event.inputs.release_version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Trigger Windows Build
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-windows.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{"release_version": "${{ env.version }}"}'

      - name: Trigger macOS Build
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-macos.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{"release_version": "${{ env.version }}"}'

      - name: Wait for builds
        run: |
          echo "Waiting for platform builds to complete..."
          echo "Check the Actions tab for build progress."

  create-combined-release:
    name: Create Combined Release
    needs: trigger-builds
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all assets
        run: |
          echo "=== All Release Assets ==="
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" \) -ls

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
          fi

          cat > RELEASE_NOTES.md << EOF
          # MT5 Signal System ${VERSION}

          ## Download Options

          ### Windows
          - **Installer**: Interactive installer with component selection
          - **Standalone EXEs**: Individual executables for each component

          ### macOS
          - **DMG**: Disk image with all applications

          ## Components

          | Component | Description |
          |-----------|-------------|
          | Master Panel | 主信号管理面板 - Manage master signal server |
          | Slave Panel | 从信号管理面板 - Manage slave signal server |
          | Unified Manager | 统一管理平台 - Full unified management |

          ## Installation

          ### Windows
          1. Download the NSIS installer (.exe)
          2. Run and select desired components
          3. Launch from Start Menu or Desktop

          ### macOS
          1. Download the DMG file
          2. Open and drag apps to Applications
          3. Launch from Applications folder

          ## Requirements
          - **Windows**: Windows 10/11
          - **macOS**: macOS 10.15 or later
          - No Python installation needed (bundled)
          EOF

      - name: Collect release files
        run: |
          mkdir -p release_assets

          # Copy Windows files
          find artifacts/windows-installer -name "*.exe" -exec cp {} release_assets/ \; 2>/dev/null || true
          find artifacts/windows-exes -name "*.exe" -exec cp {} release_assets/ \; 2>/dev/null || true

          # Copy macOS files
          find artifacts/macos-dmg -name "*.dmg" -exec cp {} release_assets/ \; 2>/dev/null || true

          ls -la release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ github.event.inputs.is_prerelease || !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
