name: Build Windows Installer

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        required: false

jobs:
  build-windows-exes:
    name: Build Windows EXEs
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller paho-mqtt numpy psutil ttkbootstrap pillow MetaTrader5
        shell: pwsh

      - name: Generate icon
        run: |
          python -c "
          from PIL import Image, ImageDraw, ImageFont
          import math

          def create_icon(size=256):
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              cx, cy = size // 2, size // 2

              # 1. Background: purple gradient circle
              bg_color1 = (75, 0, 130)
              bg_color2 = (30, 0, 60)
              for r in range(size//2, 0, -1):
                  ratio = r / (size//2)
                  color = tuple(int(bg_color1[i] * ratio + bg_color2[i] * (1-ratio)) for i in range(3))
                  draw.ellipse([(cx-r, cy-r), (cx+r, cy+r)], fill=color + (255,))

              # 2. Outer ring: golden halo
              draw.ellipse([(15, 15), (size-15, size-15)], outline=(255, 215, 0, 220), width=5)

              # 3. Brain outline (simplified)
              brain_points = []
              for angle in range(0, 360, 5):
                  rad = math.radians(angle)
                  base_r = 70
                  wave = 8 * math.sin(angle * 3 * math.pi / 180)
                  r = base_r + wave
                  x = cx + r * math.cos(rad)
                  y = cy + r * math.sin(rad) - 15
                  brain_points.append((x, y))
              
              draw.polygon(brain_points, outline=(255, 215, 0, 200), width=4)
              
              brain_inner = []
              for angle in range(0, 360, 5):
                  rad = math.radians(angle)
                  r = 65 + 6 * math.sin(angle * 3 * math.pi / 180)
                  x = cx + r * math.cos(rad)
                  y = cy + r * math.sin(rad) - 15
                  brain_inner.append((x, y))
              draw.polygon(brain_inner, fill=(255, 215, 0, 40))

              # 4. Neural network texture inside brain
              draw.ellipse([(cx-8, cy-23), (cx+8, cy-7)], fill=(255, 215, 0, 255))
              
              neuron_lines = [
                  [(cx, cy-15), (cx-30, cy-35)],
                  [(cx, cy-15), (cx+30, cy-35)],
                  [(cx, cy-15), (cx-25, cy+10)],
                  [(cx, cy-15), (cx+25, cy+10)],
                  [(cx, cy-15), (cx, cy+25)],
                  [(cx-30, cy-35), (cx-45, cy-20)],
                  [(cx+30, cy-35), (cx+45, cy-20)],
              ]
              for line in neuron_lines:
                  draw.line(line, fill=(255, 215, 0, 150), width=2)
              
              node_positions = [(cx-30, cy-35), (cx+30, cy-35), (cx-25, cy+10), 
                              (cx+25, cy+10), (cx, cy+25), (cx-45, cy-20), (cx+45, cy-20)]
              for nx, ny in node_positions:
                  draw.ellipse([(nx-4, ny-4), (nx+4, ny+4)], fill=(255, 215, 0, 180))

              # 5. Upward trend line (overlaid on brain)
              trend_line = [(cx-50, cy+30), (cx-30, cy+20), (cx-10, cy+25), 
                            (cx+10, cy+10), (cx+30, cy+15), (cx+50, cy-5)]
              for i in range(len(trend_line)-1):
                  x1, y1 = trend_line[i]
                  x2, y2 = trend_line[i+1]
                  draw.line([(x1, y1), (x2, y2)], fill=(255, 255, 255, 220), width=4)
              
              draw.polygon([(cx+50, cy-15), (cx+60, cy-5), (cx+45, cy-5)], fill=(255, 255, 255, 220))

              # 6. TM letters (TradeMind abbreviation)
              try:
                  font = ImageFont.truetype('arialbd.ttf', 48)
              except:
                  font = ImageFont.load_default()
              
              draw.text((cx-32, cy+52), 'TM', fill=(0, 0, 0, 180), font=font)
              draw.text((cx-30, cy+50), 'TM', fill=(255, 215, 0, 255), font=font)

              # 7. Bottom text
              try:
                  font_small = ImageFont.truetype('arial.ttf', 18)
              except:
                  font_small = ImageFont.load_default()
              
              draw.text((cx-55, cy+85), 'TradeMind', fill=(255, 255, 255, 230), font=font_small)
              draw.text((cx-22, cy+105), 'MT5', fill=(255, 215, 0, 200), font=font_small)

              # 8. Decoration: four corner glowing dots
              for angle in [45, 135, 225, 315]:
                  rad = math.radians(angle)
                  dx = int(cx + (size//2 - 20) * math.cos(rad))
                  dy = int(cy + (size//2 - 20) * math.sin(rad))
                  draw.ellipse([(dx-4, dy-4), (dx+4, dy+4)], fill=(255, 215, 0, 200))
                  draw.ellipse([(dx-2, dy-2), (dx+2, dy+2)], fill=(255, 255, 255, 255))

              return img

          # Generate main icon
          icon = create_icon(256)
          icon.save('icon.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])
          
          # Generate PNG for tkinter window icon
          icon_32 = create_icon(32)
          icon_32.save('icon.png')
          
          # Generate preview
          create_icon(512).save('icon_preview.png')
          
          print('[OK] TradeMind MT5 icon generated')
          print('  - icon.ico (multi-size, for exe)')
          print('  - icon.png (32x32, for tkinter)')
          print('  - icon_preview.png (512x512)')
          "
        shell: pwsh


      - name: Clean dist directory
        run: |
          if (Test-Path "dist") {
              Write-Host "Cleaning dist directory..."
              Remove-Item -Path "dist" -Recurse -Force
          }
          if (Test-Path "build") {
              Write-Host "Cleaning build directory..."
              Remove-Item -Path "build" -Recurse -Force
          }
          New-Item -Path "dist" -ItemType Directory -Force
          Write-Host "✓ dist/ directory cleaned"
        shell: pwsh

      - name: Build MT5 Manager EXE (GUI Panel)
        run: |
          Write-Host "Building MT5_Manager.exe with TradeMind icon..."
          Write-Host "Working directory: $(Get-Location)"
          Write-Host "Checking icon.ico..."
          if (Test-Path "icon.ico") {
              Write-Host "[OK] icon.ico found"
          } else {
              Write-Error "[FAIL] icon.ico not found!"
              exit 1
          }
          
          pyinstaller --clean --onefile --windowed `
            --name "MT5_Manager" `
            --icon "icon.ico" `
            --hidden-import "services" `
            --hidden-import "services.mt5_detector" `
            --hidden-import "services.process_manager" `
            --hidden-import "services.config_manager" `
            --hidden-import "ui" `
            --hidden-import "ui.dashboard" `
            --hidden-import "ui.master_config" `
            --hidden-import "ui.slave_config" `
            --hidden-import "ui.monitoring" `
            --hidden-import "ui.logs" `
            --hidden-import "common" `
            --hidden-import "common.utils" `
            --hidden-import "paho.mqtt.client" `
            --hidden-import "paho.mqtt" `
            --hidden-import "numpy" `
            --hidden-import "psutil" `
            --hidden-import "ttkbootstrap" `
            --hidden-import "ttkbootstrap.style" `
            mt5_manager.py
          
          Write-Host "Verifying MT5_Manager.exe..."
          if (Test-Path "dist\MT5_Manager.exe") {
              $size = (Get-Item "dist\MT5_Manager.exe").Length
              Write-Host "[OK] MT5_Manager.exe built successfully ($([math]::Round($size/1MB, 2)) MB)"
          } else {
              Write-Error "[FAIL] MT5_Manager.exe not found!"
              exit 1
          }
        shell: pwsh

      - name: Build MT5 Master EXE (Service)
        run: |
          Write-Host "Building MT5_Master.exe with TradeMind icon..."
          Write-Host "Checking icon.ico..."
          if (Test-Path "icon.ico") {
              Write-Host "[OK] icon.ico found"
          } else {
              Write-Error "[FAIL] icon.ico not found!"
              exit 1
          }
          
          pyinstaller --clean --onefile --console `
            --name "MT5_Master" `
            --icon "icon.ico" `
            --add-data "config;config" `
            --add-data "common;common" `
            --add-data "master;master" `
            --hidden-import "MetaTrader5" `
            --hidden-import "paho.mqtt.client" `
            --hidden-import "paho.mqtt" `
            --hidden-import "numpy" `
            --hidden-import "datetime" `
            master/signal_sender.py
          
          Write-Host "Verifying MT5_Master.exe..."
          if (Test-Path "dist\MT5_Master.exe") {
              $size = (Get-Item "dist\MT5_Master.exe").Length
              Write-Host "[OK] MT5_Master.exe built successfully ($([math]::Round($size/1MB, 2)) MB)"
          } else {
              Write-Error "[FAIL] MT5_Master.exe not found!"
              exit 1
          }
        shell: pwsh

      - name: Build MT5 Slave EXE (Service)
        run: |
          Write-Host "Building MT5_Slave.exe with TradeMind icon..."
          Write-Host "Checking icon.ico..."
          if (Test-Path "icon.ico") {
              Write-Host "[OK] icon.ico found"
          } else {
              Write-Error "[FAIL] icon.ico not found!"
              exit 1
          }
          
          pyinstaller --clean --onefile --console `
            --name "MT5_Slave" `
            --icon "icon.ico" `
            --add-data "config;config" `
            --add-data "common;common" `
            --add-data "slave;slave" `
            --hidden-import "MetaTrader5" `
            --hidden-import "paho.mqtt.client" `
            --hidden-import "paho.mqtt" `
            --hidden-import "numpy" `
            --hidden-import "datetime" `
            slave/signal_receiver.py
          
          Write-Host "Verifying MT5_Slave.exe..."
          if (Test-Path "dist\MT5_Slave.exe") {
              $size = (Get-Item "dist\MT5_Slave.exe").Length
              Write-Host "[OK] MT5_Slave.exe built successfully ($([math]::Round($size/1MB, 2)) MB)"
          } else {
              Write-Error "[FAIL] MT5_Slave.exe not found!"
              exit 1
          }
        shell: pwsh

      - name: Verify build output
        run: |
          Write-Host "=== dist/ directory after build ==="
          Get-ChildItem -Path "dist" -File | ForEach-Object { 
              Write-Host "$($_.Name) - $($_.Length) bytes"
          }
        shell: pwsh

      - name: Prepare artifacts for upload
        run: |
          # Create a clean directory without path prefixes
          New-Item -Path "artifact" -ItemType Directory -Force
          
          # Copy all three EXEs
          Copy-Item "dist/MT5_Manager.exe" "artifact/"
          Copy-Item "dist/MT5_Master.exe" "artifact/"
          Copy-Item "dist/MT5_Slave.exe" "artifact/"
          
          # Copy icon files
          Copy-Item "icon.ico" "artifact/"
          Copy-Item "icon.png" "artifact/"
          
          # Copy language files
          if (Test-Path "lang") {
            New-Item -Path "artifact/lang" -ItemType Directory -Force
            Copy-Item "lang/*.json" "artifact/lang/"
            Write-Host "✓ Language files copied"
          }
          
          # Copy common module (includes i18n)
          if (Test-Path "common") {
            Copy-Item -Recurse "common" "artifact/common"
            Write-Host "✓ Common module copied"
          }
          
          if (Test-Path "README.md") {
            Copy-Item "README.md" "artifact/"
          }
          if (Test-Path "QUICKSTART.md") {
            Copy-Item "QUICKSTART.md" "artifact/"
          }
          
          Write-Host "=== Files ready for upload ==="
          Get-ChildItem -Path "artifact" -Recurse | Where-Object {!$_.PSIsContainer} | ForEach-Object { 
              Write-Host "$($_.FullName.Replace((Get-Location).Path + '\artifact\', '')) - $($_.Length) bytes"
          }
        shell: pwsh

      - name: Upload Windows EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifact/
          retention-days: 30

  build-nsis-installer:
    name: Build NSIS Installer
    needs: build-windows-exes
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Windows EXEs
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      
      - name: Install NSIS
        run: |
          choco install nsis --version=3.10 -y
          Write-Host "✓ NSIS installed at: C:\Program Files (x86)\NSIS"
          
          # Add NSIS to PATH
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          # Verify NSIS installation
          & "C:\Program Files (x86)\NSIS\makensis.exe" /VERSION

      - name: Fix NSI file encoding to UTF-8 BOM
        run: |
          # Read the NSI file content
          $content = Get-Content build/installer.nsi -Raw -Encoding UTF8
          
          # Write it back with UTF-8 BOM
          $utf8BOM = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText("$PWD/build/installer.nsi", $content, $utf8BOM)
          
          Write-Host "✓ NSI file converted to UTF-8 BOM encoding"
        shell: pwsh

      - name: Calculate version
        id: version
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } elseif ($env:INPUT_RELEASE_VERSION) {
            $version = $env:INPUT_RELEASE_VERSION -replace '^v', ''
          } else {
            $version = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh
        env:
          INPUT_RELEASE_VERSION: ${{ github.event.inputs.release_version }}

      - name: Update NSIS script with version
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $content = Get-Content build/installer.nsi -Raw
          
          # Update OutFile path with version
          $content = $content -replace 'OutFile "\.\.\\dist\\TradeMind_MT5_Installer\.exe"', "OutFile `"..\dist\TradeMind_MT5_Installer_v$version.exe`""
          
          # Update Name with version
          $content = $content -replace 'Name "TradeMind MT5"', "Name `"TradeMind MT5 v$version`""
          
          Set-Content -Path build/installer.nsi -Value $content
          
          Write-Host "Updated installer.nsi:"
          Write-Host ($content | Select-String "OutFile|Name" | Select-Object -First 4)
        shell: pwsh
        
      - name: Build NSIS Installer
        run: |
          Write-Host "=== Before running makensis ==="
          
          # Verify files exist
          Write-Host "Checking for exe files in dist/:"
          Get-ChildItem dist/ -Filter "*.exe" | ForEach-Object {
              Write-Host "  ✓ $($_.Name) ($([math]::Round($_.Length/1MB, 2)) MB)"
          }
          
          Write-Host "`nChecking installer.nsi:"
          if (Test-Path "build/installer.nsi") {
              Write-Host "✓ File exists" -ForegroundColor Green
          } else {
              Write-Host "✗ File not found!" -ForegroundColor Red
              exit 1
          }
          
          # Run makensis from build/ directory so relative paths work
          Write-Host "`nRunning: cd build && makensis installer.nsi"
          Set-Location build
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
          
          if ($LASTEXITCODE -eq 0) {
              Write-Host "✓ NSIS build successful!" -ForegroundColor Green
              
              # Verify installer was created
              if (Test-Path "..\dist\TradeMind_MT5_Installer*.exe") {
                  $installer = Get-Item "..\dist\TradeMind_MT5_Installer*.exe" | Select-Object -First 1
                  Write-Host "✓ Installer created: $($installer.Name) ($([math]::Round($installer.Length/1MB, 2)) MB)"
              }
          } else {
              Write-Host "✗ NSIS build failed!" -ForegroundColor Red
              exit 1
          }
        shell: pwsh

      - name: Upload NSIS Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/TradeMind_MT5_Installer*.exe
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build-nsis-installer
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
