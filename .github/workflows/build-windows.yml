name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-exes:
    name: Build Windows EXEs
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller paho-mqtt numpy psutil ttkbootstrap pillow
        shell: pwsh

      - name: Generate icon
        run: |
          python -c "from PIL import Image, ImageDraw, ImageFont; img = Image.new('RGBA', (256,256), (30,100,200,255)); draw = ImageDraw.Draw(img); draw.ellipse([(20,20),(236,236)], outline=(255,255,255,200), width=8); draw.rectangle([(60,60),(196,196)], outline=(255,255,255,150), width=4); font = ImageFont.load_default(); draw.text((60, 70), 'MT5', fill=(255,255,255), font=font); img.save('icon.ico')"
        shell: pwsh

      - name: Clean dist directory
        run: |
          if (Test-Path "dist") {
              Write-Host "Cleaning dist directory..."
              Remove-Item -Path "dist" -Recurse -Force
          }
          if (Test-Path "build") {
              Write-Host "Cleaning build directory..."
              Remove-Item -Path "build" -Recurse -Force
          }
          New-Item -Path "dist" -ItemType Directory -Force
          Write-Host "✓ dist/ directory cleaned"
        shell: pwsh

      - name: Build MT5 Manager EXE (Panel)
        run: |
          pyinstaller --clean --onefile --windowed `
            --name "MT5_Manager" `
            --icon "icon.ico" `
            --hidden-import "services" `
            --hidden-import "services.mt5_detector" `
            --hidden-import "services.process_manager" `
            --hidden-import "services.config_manager" `
            --hidden-import "ui" `
            --hidden-import "ui.dashboard" `
            --hidden-import "ui.master_config" `
            --hidden-import "ui.slave_config" `
            --hidden-import "ui.monitoring" `
            --hidden-import "ui.logs" `
            --hidden-import "common" `
            --hidden-import "common.utils" `
            --hidden-import "paho.mqtt.client" `
            --hidden-import "paho.mqtt" `
            --hidden-import "numpy" `
            --hidden-import "psutil" `
            --hidden-import "ttkbootstrap" `
            --hidden-import "ttkbootstrap.style" `
            mt5_manager.py
        shell: pwsh

      - name: Build MT5 Master EXE (Service)
        run: |
          pyinstaller --clean --onefile --console `
            --name "MT5_Master" `
            --icon "icon.ico" `
            --add-data "config;config" `
            --add-data "common;common" `
            --hidden-import "paho.mqtt.client" `
            --hidden-import "paho.mqtt" `
            --hidden-import "numpy" `
            master/signal_sender.py
        shell: pwsh

      - name: Build MT5 Slave EXE (Service)
        run: |
          pyinstaller --clean --onefile --console `
            --name "MT5_Slave" `
            --icon "icon.ico" `
            --add-data "config;config" `
            --add-data "common;common" `
            --hidden-import "paho.mqtt.client" `
            --hidden-import "paho.mqtt" `
            --hidden-import "numpy" `
            slave/signal_receiver.py
        shell: pwsh

      - name: Verify build output
        run: |
          Write-Host "=== dist/ directory after build ==="
          Get-ChildItem -Path "dist" -File | ForEach-Object { 
              Write-Host "$($_.Name) - $($_.Length) bytes"
          }
        shell: pwsh

      - name: Prepare files for upload
        run: |
          # Create a clean directory without path prefixes
          New-Item -Path "artifact" -ItemType Directory -Force
          
          # Copy all three EXEs
          Copy-Item "dist/MT5_Manager.exe" "artifact/"
          Copy-Item "dist/MT5_Master.exe" "artifact/"
          Copy-Item "dist/MT5_Slave.exe" "artifact/"
          Copy-Item "icon.ico" "artifact/"
          
          if (Test-Path "README.md") {
            Copy-Item "README.md" "artifact/"
          }
          if (Test-Path "QUICKSTART.md") {
            Copy-Item "QUICKSTART.md" "artifact/"
          }
          
          Write-Host "=== Files ready for upload ==="
          Get-ChildItem -Path "artifact" | ForEach-Object { 
              Write-Host "$($_.Name) - $($_.Length) bytes"
          }
        shell: pwsh

      - name: Upload Windows EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifact/
          retention-days: 30

  build-nsis-installer:
    name: Build NSIS Installer
    needs: build-windows-exes
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Install NSIS
        run: |
          choco install nsis --yes --no-progress
          Write-Host "✓ NSIS installed at: C:\Program Files (x86)\NSIS"
          makensis /VERSION
        shell: pwsh

      - name: Debug file locations
        run: |
          Write-Host "=== Current working directory ==="
          pwd
          
          Write-Host "`n=== Repository root contents ==="
          Get-ChildItem -Force | Select-Object -First 20 | ForEach-Object { 
              Write-Host "$($_.Name) $($_.Mode)"
          }
          
          Write-Host "`n=== dist/ directory contents ==="
          Get-ChildItem -Path "dist" -File | ForEach-Object { 
              Write-Host "$($_.FullName) - $($_.Length) bytes"
          }
          
          Write-Host "`n=== Checking file existence ==="
          $testPath = "dist\MT5_Manager.exe"
          Write-Host "Testing path: $testPath"
          if (Test-Path $testPath) {
              Write-Host "✓ File exists!" -ForegroundColor Green
              $fileInfo = Get-Item $testPath
              Write-Host "  Full path: $($fileInfo.FullName)"
              Write-Host "  Size: $($fileInfo.Length) bytes"
          } else {
              Write-Host "✗ File NOT found!" -ForegroundColor Red
              Write-Host "`nListing all files in workspace:"
              Get-ChildItem -Recurse -File | Where-Object { $_.Name -like "*MT5*" } | ForEach-Object {
                  Write-Host "  $($_.FullName)"
              }
          }
        shell: pwsh

      - name: Verify downloaded files
        run: |
          Write-Host "=== Files in dist/ directory ==="
          Get-ChildItem -Path "dist" -File | ForEach-Object { 
              Write-Host "$($_.Name) - $($_.Length) bytes"
          }
          
          Write-Host "`n=== Checking for required files ==="
          $success = $true
          
          if (Test-Path "dist\MT5_Manager.exe") {
              Write-Host "✓ MT5_Manager.exe found" -ForegroundColor Green
          } else {
              Write-Host "✗ MT5_Manager.exe NOT found" -ForegroundColor Red
              $success = $false
          }
          
          if (Test-Path "dist\MT5_Master.exe") {
              Write-Host "✓ MT5_Master.exe found" -ForegroundColor Green
          } else {
              Write-Host "✗ MT5_Master.exe NOT found" -ForegroundColor Red
              $success = $false
          }
          
          if (Test-Path "dist\MT5_Slave.exe") {
              Write-Host "✓ MT5_Slave.exe found" -ForegroundColor Green
          } else {
              Write-Host "✗ MT5_Slave.exe NOT found" -ForegroundColor Red
              $success = $false
          }
          
          if (Test-Path "dist\icon.ico") {
              Write-Host "✓ icon.ico found" -ForegroundColor Green
          } else {
              Write-Host "✗ icon.ico NOT found" -ForegroundColor Yellow
          }
          
          if (-not $success) {
              Write-Host "`n=== Full directory tree ===" -ForegroundColor Red
              Get-ChildItem -Path "dist" -Recurse | ForEach-Object { Write-Host $_.FullName }
              exit 1
          }
        shell: pwsh

      - name: Get version
        id: version
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } elseif ($env:INPUT_RELEASE_VERSION) {
            $version = $env:INPUT_RELEASE_VERSION -replace '^v', ''
          } else {
            $version = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh
        env:
          INPUT_RELEASE_VERSION: ${{ github.event.inputs.release_version }}

      - name: Update NSIS script with version
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $content = Get-Content build/installer.nsi -Raw
          $content = $content -replace 'OutFile "dist\\MT5_Signal_System_Installer.exe"', "OutFile `"dist\MT5_Signal_System_Installer_v$version.exe`""
          $content = $content -replace 'Name "MT5 Signal System"', "Name `"MT5 Signal System v$version`""
          Set-Content -Path build/installer.nsi -Value $content
        shell: pwsh

      - name: Build NSIS Installer
        run: |
          Write-Host "=== Before running makensis ==="
          Write-Host "Working directory: $(Get-Location)"
          Write-Host "Checking dist\MT5_Manager.exe..."
          if (Test-Path "dist\MT5_Manager.exe") {
              Write-Host "✓ File exists, proceeding with makensis" -ForegroundColor Green
          } else {
              Write-Host "✗ File missing!" -ForegroundColor Red
              exit 1
          }
          Write-Host "`nRunning: makensis build/installer.nsi"
          makensis build/installer.nsi
        shell: pwsh

      - name: Verify installer
        run: |
          Write-Host "=== Installer files ==="
          Get-ChildItem dist\*.exe | ForEach-Object { Write-Host $_.FullName -ForegroundColor Green }
        shell: pwsh

      - name: Upload NSIS Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/MT5_Signal_System_Installer_v*.exe
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build-nsis-installer
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List release assets
        run: |
          echo "=== Available files ==="
          find . -type f -name "*.exe" -ls
          echo ""
          echo "=== Directory structure ==="
          find . -type f | head -20
        shell: bash

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'NOTESEOF'
          # MT5 Signal System

          ## ✨ 功能特性

          ### 统一管理面板
          - 🎯 **一体化客户端**：单个可执行文件，集成所有功能
          - 🎨 **专业图标**：自定义应用程序图标
          - 🔧 **Master/Slave 可选**：安装时选择启用 Master 或 Slave 功能
          - 🔍 **自动环境检测**：启动时自动检查 Python 环境
          - 📦 **自动依赖安装**：缺失依赖自动安装，无需手动操作

          ### 完全独立的 EXE 文件
          所有组件都已编译为独立的 Windows 可执行文件：
          - ✅ **MT5_Manager.exe** - 管理面板（GUI）
          - ✅ **MT5_Master.exe** - Master 信号服务（控制台）
          - ✅ **MT5_Slave.exe** - Slave 信号服务（控制台）
          
          **无需安装 Python！** 所有依赖已内置。

          ## 📥 安装步骤

          1. 下载 `MT5_Signal_System_Installer_v*.exe`
          2. 运行安装程序，选择需要的功能（Master/Slave）
          3. 从桌面或开始菜单启动"MT5 Manager"
          4. 面板会根据安装时的选择自动显示对应的功能
          5. 点击"启动 Master/Slave"按钮即可运行服务

          ## ⚙️ 系统要求

          - Windows 10/11
          - **无需 Python 环境**（已内置）
          - MetaTrader 5 终端（可选，仅在使用交易功能时需要）

          ## 📝 使用说明

          安装时可选择：
          - **仅 Master**：作为主信号服务器，发送交易信号
          - **仅 Slave**：作为从信号服务器，接收并执行交易
          - **两者都装**：完整的统一管理模式

          启动 MT5 Manager 后，面板会根据安装时的选择自动显示对应功能。
          NOTESEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-installer/*.exe
            windows-build/*.exe
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}