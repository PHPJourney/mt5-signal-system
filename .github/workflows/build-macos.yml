name: Build macOS DMG

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-macos-apps:
    name: Build macOS Apps
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller paho-mqtt psutil ttkbootstrap

      - name: Build Master Panel App
        run: |
          pyinstaller --clean --onefile --windowed \
            --name "MT5_Master_Panel" \
            --add-data "config:config" \
            --add-data "common:common" \
            --add-data "master:master" \
            --add-data "slave:slave" \
            --hidden-import "paho.mqtt.client" \
            --hidden-import "psutil" \
            --hidden-import "ttkbootstrap" \
            --hidden-import "master.signal_sender" \
            --hidden-import "master.auth_manager" \
            master_panel.py

      - name: Build Slave Panel App
        run: |
          pyinstaller --clean --onefile --windowed \
            --name "MT5_Slave_Panel" \
            --add-data "config:config" \
            --add-data "common:common" \
            --add-data "master:master" \
            --add-data "slave:slave" \
            --hidden-import "paho.mqtt.client" \
            --hidden-import "psutil" \
            --hidden-import "ttkbootstrap" \
            --hidden-import "slave.signal_receiver" \
            --hidden-import "slave.symbol_mapper" \
            --hidden-import "slave.risk_manager" \
            slave_panel.py

      - name: Build Unified Manager App
        run: |
          pyinstaller --clean --onefile --windowed \
            --name "MT5_Unified_Manager" \
            --add-data "config:config" \
            --add-data "common:common" \
            --add-data "master:master" \
            --add-data "slave:slave" \
            --hidden-import "paho.mqtt.client" \
            --hidden-import "psutil" \
            --hidden-import "ttkbootstrap" \
            --hidden-import "master.signal_sender" \
            --hidden-import "master.auth_manager" \
            --hidden-import "slave.signal_receiver" \
            --hidden-import "slave.symbol_mapper" \
            mt5_unified_manager.py

      - name: List built apps
        run: ls -la dist/*.app

      - name: Upload macOS App artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-apps
          path: |
            dist/MT5_Master_Panel.app
            dist/MT5_Slave_Panel.app
            dist/MT5_Unified_Manager.app
          retention-days: 30

  create-dmg:
    name: Create DMG Installer
    needs: build-macos-apps
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS Apps
        uses: actions/download-artifact@v4
        with:
          name: macos-apps
          path: dist

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            VERSION="${{ github.event.inputs.release_version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev-${GITHUB_SHA:0:7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          # Create temporary directory for DMG contents
          mkdir -p dmg_contents/Applications

          # Copy apps
          cp -R dist/MT5_Master_Panel.app dmg_contents/
          cp -R dist/MT5_Slave_Panel.app dmg_contents/
          cp -R dist/MT5_Unified_Manager.app dmg_contents/

          # Copy config and docs
          cp -R config dmg_contents/ 2>/dev/null || true
          cp README.md dmg_contents/ 2>/dev/null || true

          # Create DMG
          hdiutil create -volname "MT5 Signal System v${{ steps.version.outputs.version }}" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "dist/MT5_Signal_System_v${{ steps.version.outputs.version }}.dmg"

      - name: Verify DMG
        run: |
          ls -lh dist/*.dmg
          hdiutil verify dist/*.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/MT5_Signal_System_v*.dmg
          retention-days: 30

  release-macos:
    name: Release macOS DMG
    needs: create-dmg
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MT5_Signal_System_v*.dmg
          body: |
            ## macOS Installation

            1. Download the DMG file
            2. Open and drag apps to Applications folder
            3. Launch from Applications or Spotlight

            ### Included Apps:
            - **MT5_Master_Panel.app**: Master signal management
            - **MT5_Slave_Panel.app**: Slave signal management
            - **MT5_Unified_Manager.app**: Full unified management

            ### Requirements
            - macOS 10.15 or later
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
